name: Aegis-Grid CI/CD

on:
  push:
    branches: [ "main", "jules/**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        cd aegis-grid/backend
        python -m pip install --upgrade pip
        pip install fastapi uvicorn websockets pytest
    - name: Run tests
      run: |
        cd aegis-grid/backend
        # pytest # Temporarily commented until full test suite is active

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node
      uses: actions/setup-node@v3
      with:
        node-version: 18
    - name: Install dependencies
      run: |
        cd aegis-grid/frontend
        npm install
    - name: Build
      run: |
        cd aegis-grid/frontend
        npm run build
